<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | ChatVolt</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

<section class="max-w-3xl mx-auto py-20 px-6">
  <h1 class="text-4xl font-bold mb-8 text-center">Contact Us</h1>

  <form class="bg-white p-8 rounded-xl shadow-md space-y-6">
    <input type="text" placeholder="Your Name"
           class="w-full border p-3 rounded-lg">

    <input type="email" placeholder="Your Email"
           class="w-full border p-3 rounded-lg">

    <textarea placeholder="Your Message"
              class="w-full border p-3 rounded-lg h-32"></textarea>

    <button class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700">
      Send Message
    </button>
  </form>

</section>

</body>
</html>
