<!DOCTYPE html>
<html>
<head>
  <title>ChatVolt Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f0c29, #1a0f3c, #120b2e);
      font-family: 'Inter', sans-serif;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hover-glow:hover {
      box-shadow: 0 0 25px rgba(139,92,246,.35);
      transform: scale(1.02);
      transition: all .3s;
    }

    .fade-in {
      animation: fadeIn .6s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(15px); }
      to { opacity:1; transform:translateY(0); }
    }

    .tab-btn {
      padding:10px 20px;
      border-radius:12px;
      background: rgba(255,255,255,0.05);
      transition:.3s;
    }

    .tab-btn:hover {
      background:#7c3aed;
    }
  </style>
</head>

<body class="text-white min-h-screen p-8 fade-in">

<!-- HEADER -->
<div class="flex justify-between items-center mb-10">
  <h1 class="text-3xl font-bold text-purple-400 flex items-center gap-3">
    <i data-lucide="layout-dashboard"></i> ChatVolt Dashboard
  </h1>
  <button class="bg-red-600 px-5 py-2 rounded-lg hover:bg-red-700">
    Logout
  </button>
</div>

<!-- STATS -->
<div class="grid md:grid-cols-4 gap-6 mb-10">
  <div class="glass p-6 rounded-xl hover-glow">
    <div class="flex justify-between"><h3>Total Leads</h3><i data-lucide="users"></i></div>
    <p class="text-3xl mt-4 font-bold">120</p>
  </div>

  <div class="glass p-6 rounded-xl hover-glow">
    <div class="flex justify-between"><h3>Active Followups</h3><i data-lucide="clock"></i></div>
    <p class="text-3xl mt-4 font-bold">18</p>
  </div>

  <div class="glass p-6 rounded-xl hover-glow">
    <div class="flex justify-between"><h3>Plan</h3><i data-lucide="badge-check"></i></div>
    <p class="text-3xl mt-4 font-bold text-green-400">Pro</p>
  </div>

  <div class="glass p-6 rounded-xl hover-glow">
    <div class="flex justify-between"><h3>Expiry</h3><i data-lucide="calendar"></i></div>
    <p class="text-xl mt-4 font-bold text-yellow-400">28 Feb 2026</p>
  </div>
</div>

<!-- TABS -->
<div class="flex gap-4 mb-8">
  <button onclick="showTab(0)" class="tab-btn">Overview</button>
  <button onclick="showTab(1)" class="tab-btn">Leads</button>
  <button onclick="showTab(2)" class="tab-btn">Follow Ups</button>
  <button onclick="showTab(3)" class="tab-btn">Business Info</button>
  <button onclick="showTab(4)" class="tab-btn">Billing</button>
</div>

<!-- OVERVIEW -->
<div class="tab">
  <div class="glass p-8 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6">WhatsApp Business Connection</h2>

    <input placeholder="Enter WhatsApp Business Number"
      class="w-full p-3 bg-black/40 rounded-lg mb-4 border border-purple-500/30">

    <button class="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-700">
      Connect Number
    </button>
  </div>
</div>

<!-- LEADS -->
<div class="tab hidden">
  <div class="glass p-6 rounded-xl">
    <h2 class="text-xl font-bold mb-6">Lead Capture</h2>

    <table class="w-full text-left">
      <tr class="text-purple-400">
        <th class="p-3">Name</th>
        <th class="p-3">Number</th>
        <th class="p-3">Status</th>
      </tr>
      <tr class="border-t border-purple-500/20">
        <td class="p-3">Rahul</td>
        <td class="p-3">9876543210</td>
        <td class="p-3 text-green-400">Interested</td>
      </tr>
    </table>
  </div>
</div>

<!-- FOLLOW UPS -->
<div class="tab hidden">
  <div class="glass p-6 rounded-xl">
    <h2 class="text-xl font-bold mb-6">Follow-Up System</h2>

    <input placeholder="Lead Number"
      class="w-full p-3 bg-black/40 rounded-lg mb-3 border border-purple-500/30">

    <input type="date"
      class="w-full p-3 bg-black/40 rounded-lg mb-3 border border-purple-500/30">

    <button class="bg-purple-600 px-6 py-2 rounded-lg">
      Schedule Follow-Up
    </button>
  </div>
</div>

<!-- BUSINESS INFO -->
<div class="tab hidden">
  <div class="glass p-6 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6">Business Information</h2>

    <input placeholder="Business Name"
      class="w-full p-3 bg-black/40 rounded mb-3 border border-purple-500/30">

    <input placeholder="Working Hours"
      class="w-full p-3 bg-black/40 rounded mb-3 border border-purple-500/30">

    <textarea placeholder="Products / Services"
      class="w-full p-3 bg-black/40 rounded mb-3 border border-purple-500/30"></textarea>

    <button class="bg-indigo-600 px-6 py-3 rounded-lg w-full">
      Save Info
    </button>
  </div>
</div>

<!-- BILLING -->
<div class="tab hidden">
  <div class="glass p-6 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6">Billing & Renew</h2>

    <p class="mb-4">Current Plan: <span class="text-green-400 font-bold">Pro</span></p>

    <button class="bg-yellow-500 px-6 py-3 rounded-lg mr-4">
      Renew Plan
    </button>

    <button class="bg-purple-600 px-6 py-3 rounded-lg">
      Upgrade Plan
    </button>
  </div>
</div>

<script>
function showTab(i){
  document.querySelectorAll(".tab").forEach((t,index)=>{
    t.classList.toggle("hidden", index!==i)
  })
}
showTab(0)
lucide.createIcons()
</script>

</body>
</html>
