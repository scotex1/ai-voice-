<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | ChatVolt</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Poppins', sans-serif; }

/* Premium Blackberry Gradient */
body {
  background: linear-gradient(135deg, #1a002e, #2d004d, #4b0082);
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

.float { animation: float 5s ease-in-out infinite; }
.float-slow { animation: float 7s ease-in-out infinite; }

/* Button glow */
.glow:hover {
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
  transform: translateY(-2px);
}
</style>
</head>

<body class="min-h-screen relative overflow-hidden text-white">

<!-- Floating Icons -->
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
     class="w-16 absolute top-24 left-16 float opacity-20">

<img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png"
     class="w-14 absolute bottom-24 right-20 float-slow opacity-20">

<!-- NAVBAR -->
<header class="backdrop-blur-xl bg-white/10 border-b border-white/10 sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center p-5">

    <a href="index.html" class="text-2xl font-bold tracking-wide">
      <span class="text-white">Chat</span>
      <span class="text-purple-300">Volt</span>
    </a>

    <div class="space-x-6 font-medium text-gray-200">
      <a href="pricing.html" class="hover:text-purple-300 transition">Pricing</a>
      <a href="login.html" class="text-purple-300">Login</a>
      <a href="signup.html"
         class="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded-full transition">
         Get Started
      </a>
    </div>

  </div>
</header>

<!-- LOGIN SECTION -->
<section class="flex items-center justify-center min-h-[calc(100vh-100px)] px-4">

  <div class="bg-white/10 backdrop-blur-2xl border border-white/10 shadow-2xl rounded-3xl p-10 w-full max-w-md">

    <h2 class="text-3xl font-bold text-center mb-8">
      Welcome Back
    </h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full mb-5 p-4 bg-white/10 border border-white/20 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none placeholder-gray-300">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-4 bg-white/10 border border-white/20 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none placeholder-gray-300">

    <p class="text-right mb-6">
      <a href="#" id="forgotPassword"
         class="text-sm text-purple-300 hover:underline">
        Forgot Password?
      </a>
    </p>

    <button id="loginBtn"
      class="w-full bg-purple-600 glow font-semibold py-4 rounded-xl transition duration-300">
      Login
    </button>

    <p class="text-center text-gray-300 mt-6">
      New here?
      <a href="signup.html" class="text-purple-300 hover:underline">
        Create account
      </a>
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer class="bg-black/40 backdrop-blur-xl border-t border-white/10 py-10 mt-16">
  <div class="container mx-auto px-6 text-center text-sm text-gray-400 space-y-4">

    <p class="font-semibold text-white">
      © 2026 ChatVolt
    </p>

    <div class="flex flex-wrap justify-center gap-6">

      <a href="terms.html" class="hover:text-purple-300 transition">
        Terms & Conditions
      </a>

      <a href="payment-policy.html" class="hover:text-purple-300 transition">
        Payment Policy
      </a>

      <a href="shipping.html" class="hover:text-purple-300 transition">
        Shipping Policy
      </a>

      <a href="contact.html" class="hover:text-purple-300 transition">
        Contact Us
      </a>

    </div>

  </div>
</footer>

</body>
</html>
